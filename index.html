<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday Areeba 💖</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --sky:#7dd3fc;--skydeep:#0ea5e9;
      --lav:#c4b5fd;--lavdeep:#8b5cf6;
      --bg1:#0c1a3a;--bg2:#1a1060;
      --blush:#e0f2fe;--gold:#fde68a;--white:#f0f9ff;
      --pink:#f9a8d4;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Quicksand',sans-serif;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:var(--white);min-height:100vh;overflow-x:hidden;}
    #skyBg{position:fixed;inset:0;z-index:0;pointer-events:none;
      background:radial-gradient(ellipse at 15% 20%,rgba(125,211,252,.18) 0%,transparent 50%),
                 radial-gradient(ellipse at 85% 70%,rgba(196,181,253,.22) 0%,transparent 50%),
                 linear-gradient(160deg,#050d2e 0%,#0f1f5c 40%,#1a1060 100%);}
    .star{position:fixed;border-radius:50%;background:#fff;opacity:0;pointer-events:none;z-index:1;animation:twinkle var(--d) ease-in-out infinite var(--dl);}
    @keyframes twinkle{0%,100%{opacity:0;}50%{opacity:var(--op);}}
    .petal{position:fixed;pointer-events:none;z-index:2;font-size:var(--fs);opacity:0;top:-60px;left:var(--lft);animation:petalFall var(--dur) linear var(--del) infinite;}
    @keyframes petalFall{0%{opacity:0;transform:translateY(0) rotate(0deg);}10%{opacity:.85;}90%{opacity:.6;}100%{opacity:0;transform:translateY(110vh) rotate(600deg) scale(.4);}}
    .balloon{position:fixed;bottom:-120px;z-index:3;font-size:var(--bfs);opacity:0;left:var(--blft);animation:riseUp var(--bd) ease-in var(--bdel) infinite;}
    @keyframes riseUp{0%{opacity:0;transform:translateY(0) rotate(-4deg);}6%{opacity:1;}94%{opacity:.7;}100%{opacity:0;transform:translateY(-120vh) rotate(4deg);}}
    .fheart{position:fixed;pointer-events:none;z-index:2;font-size:var(--fhs);opacity:0;bottom:-60px;left:var(--fhl);animation:floatHeart var(--fhd) ease-in var(--fhdel) infinite;}
    @keyframes floatHeart{0%{opacity:0;transform:translateY(0);}10%{opacity:.5;}90%{opacity:.2;}100%{opacity:0;transform:translateY(-100vh) scale(.3);}}
    .orb{position:fixed;border-radius:50%;filter:blur(90px);opacity:.14;pointer-events:none;z-index:0;}
    .orb1{width:380px;height:380px;background:var(--sky);top:-80px;left:-80px;animation:orbF 9s ease-in-out infinite;}
    .orb2{width:280px;height:280px;background:var(--lav);bottom:-60px;right:-60px;animation:orbF 11s ease-in-out 3s infinite;}
    .orb3{width:220px;height:220px;background:var(--skydeep);top:40%;left:50%;transform:translate(-50%,-50%);animation:orbF 13s ease-in-out 6s infinite;}
    @keyframes orbF{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(25px,-18px) scale(1.08);}66%{transform:translate(-18px,25px) scale(.94);}}
    #confettiCanvas{position:fixed;inset:0;z-index:5;pointer-events:none;}

    /* SCREENS */
    #splash,#cakeScreen,#mainPage{position:relative;z-index:10;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;}
    #cakeScreen,#mainPage{display:none;}
    #mainPage{padding:4rem 2rem;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(28px);}to{opacity:1;transform:translateY(0);}}

    /* SPLASH */
    .splash-emoji{font-size:clamp(3rem,10vw,5.5rem);animation:floatBob 3s ease-in-out infinite;}
    @keyframes floatBob{0%,100%{transform:translateY(0);}50%{transform:translateY(-16px);}}
    .splash-title{font-family:'Great Vibes',cursive;font-size:clamp(2.5rem,8vw,5rem);background:linear-gradient(135deg,var(--blush),var(--gold),var(--sky));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.2;margin:1rem 0 .5rem;animation:fadeUp 1.2s ease forwards;}
    .splash-sub{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1rem,3vw,1.4rem);color:var(--blush);letter-spacing:.1em;margin-bottom:2rem;opacity:0;animation:fadeUp 1.2s ease .5s forwards;}
    .btn-main{position:relative;overflow:hidden;font-family:'Quicksand',sans-serif;font-size:clamp(1rem,3vw,1.15rem);font-weight:600;letter-spacing:.1em;padding:1rem 2.8rem;border:none;border-radius:50px;cursor:pointer;background:linear-gradient(135deg,var(--skydeep),var(--lavdeep));color:#fff;box-shadow:0 0 28px rgba(125,211,252,.45),0 0 55px rgba(139,92,246,.3);transition:transform .3s,box-shadow .3s;opacity:0;animation:fadeUp 1s ease 1s forwards;}
    .btn-main:hover{transform:scale(1.08) translateY(-3px);box-shadow:0 0 48px rgba(125,211,252,.65),0 0 80px rgba(139,92,246,.5);}

    /* CAKE SCREEN */
    .cake-title{font-family:'Great Vibes',cursive;font-size:clamp(2rem,7vw,3.2rem);background:linear-gradient(135deg,var(--gold),var(--sky));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem;animation:fadeUp .8s ease forwards;}
    .cake-subtitle{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.9rem,2.5vw,1.15rem);color:var(--blush);margin-bottom:1.4rem;letter-spacing:.08em;animation:fadeUp .8s ease .3s both;}

    /* SCENE WRAPPER */
    #sceneWrap{width:min(500px,96vw);position:relative;animation:fadeUp .8s ease .5s both;}
    #sceneSvg{width:100%;height:auto;overflow:visible;}

    /* Couple walks in from sides */
    #boyGroup{transform:translateX(-180px);opacity:0;transition:transform 1.2s cubic-bezier(.34,1.3,.64,1),opacity .8s ease;}
    #girlGroup{transform:translateX(180px);opacity:0;transition:transform 1.2s cubic-bezier(.34,1.3,.64,1),opacity .8s ease;}
    #boyGroup.walkin{transform:translateX(0);opacity:1;}
    #girlGroup.walkin{transform:translateX(0);opacity:1;}

    /* Knife slides down */
    #knifeGroup{transform:translateY(-200px);opacity:0;transition:transform 1.2s cubic-bezier(.25,.46,.45,.94) 2.2s,opacity .4s ease 2.2s;}
    #knifeGroup.cut{transform:translateY(0);opacity:1;}

    /* Cake opens */
    #sliceL{transition:transform 1s ease 3.6s;}
    #sliceR{transition:transform 1s ease 3.6s;}
    #sliceL.open{transform:translateX(-28px) rotate(-6deg);}
    #sliceR.open{transform:translateX(28px) rotate(6deg);}

    /* Hearts pop above couple */
    .coupleHeart{opacity:0;animation:heartPop .6s ease var(--hd) forwards;}
    @keyframes heartPop{0%{opacity:0;transform:translateY(0) scale(0);}60%{opacity:1;transform:translateY(-18px) scale(1.3);}100%{opacity:.9;transform:translateY(-26px) scale(1);}}

    /* Sparkles */
    .sparkle{position:absolute;font-size:1.3rem;opacity:0;animation:sparklePop .7s ease var(--sd) forwards;}
    @keyframes sparklePop{0%{opacity:0;transform:scale(0) rotate(0deg);}60%{opacity:1;transform:scale(1.4) rotate(25deg);}100%{opacity:.85;transform:scale(1) rotate(10deg);}}

    /* Couple walk-out */
    #boyGroup.walkout{transform:translateX(-220px);opacity:0;transition:transform 1s ease,opacity .8s ease;}
    #girlGroup.walkout{transform:translateX(220px);opacity:0;transition:transform 1s ease,opacity .8s ease;}

    #cutBtn{margin-top:1.5rem;opacity:0;animation:fadeUp .8s ease 1s both;}

    /* MAIN CARD */
    .card{background:linear-gradient(145deg,rgba(125,211,252,.08),rgba(139,92,246,.12));border:1px solid rgba(125,211,252,.2);border-radius:32px;padding:clamp(2rem,6vw,3.5rem) clamp(2rem,8vw,4.5rem);max-width:660px;width:100%;backdrop-filter:blur(20px);box-shadow:0 0 70px rgba(125,211,252,.12),0 0 140px rgba(139,92,246,.1);position:relative;overflow:hidden;}
    .card::before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(ellipse at 50% 0%,rgba(125,211,252,.1) 0%,transparent 65%);}
    .bday-icon{font-size:clamp(2.5rem,8vw,3.8rem);animation:pulse 2s ease-in-out infinite;}
    @keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.14);}}
    .bday-name{font-family:'Great Vibes',cursive;font-size:clamp(2.8rem,9vw,5rem);background:linear-gradient(135deg,var(--gold) 0%,var(--sky) 50%,var(--lav) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;margin-bottom:.3rem;}
    .nickname{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(1rem,3.5vw,1.4rem);color:var(--blush);letter-spacing:.08em;margin-bottom:1.4rem;opacity:.85;}
    .divider{display:flex;align-items:center;gap:1rem;margin:1.1rem 0;color:var(--sky);font-size:1rem;opacity:.5;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--sky),transparent);}
    #typedMsg{font-family:'Cormorant Garamond',serif;font-size:clamp(1rem,2.8vw,1.2rem);line-height:1.95;color:#bae6fd;font-weight:300;min-height:5em;text-align:left;}
    #cursor{display:inline-block;width:2px;height:1em;background:var(--sky);vertical-align:middle;margin-left:2px;animation:blink .7s step-end infinite;}
    @keyframes blink{50%{opacity:0;}}
    .hearts-row{display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap;margin:1.4rem 0 1rem;}
    .heart-anim{font-size:clamp(1.3rem,4vw,1.7rem);animation:hb 1.4s ease-in-out infinite;}
    .heart-anim:nth-child(2){animation-delay:.2s;}.heart-anim:nth-child(3){animation-delay:.4s;}.heart-anim:nth-child(4){animation-delay:.6s;}.heart-anim:nth-child(5){animation-delay:.8s;}
    @keyframes hb{0%,100%{transform:scale(1);}14%{transform:scale(1.28);}28%{transform:scale(1);}42%{transform:scale(1.18);}}
    .final-msg{margin-top:1.4rem;padding:1.2rem 1.8rem;background:rgba(125,211,252,.08);border-radius:20px;border:1px solid rgba(125,211,252,.18);}
    .final-line1{font-family:'Great Vibes',cursive;font-size:clamp(1.7rem,5.5vw,2.5rem);background:linear-gradient(90deg,var(--gold),var(--sky));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.4rem;}
    .final-line2{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(.9rem,2.3vw,1.1rem);color:var(--blush);letter-spacing:.1em;opacity:.88;}
    #musicBtn{position:fixed;bottom:2rem;right:2rem;z-index:100;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--skydeep),var(--lavdeep));border:none;cursor:pointer;font-size:1.35rem;display:none;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(125,211,252,.45);transition:transform .3s,box-shadow .3s;}
    #musicBtn:hover{transform:scale(1.15);}
    @media(max-width:600px){.card{padding:2rem 1.5rem;border-radius:24px;}}
  </style>
</head>
<body>
<div id="skyBg"></div>
<div class="orb orb1"></div><div class="orb orb2"></div><div class="orb orb3"></div>
<canvas id="confettiCanvas"></canvas>
<audio id="bgMusic" loop preload="auto">
  <source src="https://cdn.pixabay.com/download/audio/2022/08/02/audio_884fe92c21.mp3" type="audio/mpeg"/>
</audio>
<button id="musicBtn" title="Toggle Music">🎵</button>

<!-- ======= SPLASH ======= -->
<section id="splash">
  <div class="splash-emoji">🎂</div>
  <h1 class="splash-title">A Special Surprise for You…</h1>
  <p class="splash-sub">Something beautiful is waiting, Areeba 💙</p>
  <button class="btn-main" onclick="goToCake()">✨ Open Your Surprise ✨</button>
</section>

<!-- ======= CAKE SCREEN ======= -->
<section id="cakeScreen">
  <div class="cake-title">Make a Wish, Areeba! 🎂</div>
  <p class="cake-subtitle">~ Golo Molo · Chanda ~</p>

  <div id="sceneWrap">
    <!-- floating sparkles -->
    <span class="sparkle" style="top:-14px;left:30px;--sd:2.3s;">✨</span>
    <span class="sparkle" style="top:-10px;right:30px;--sd:2.6s;">⭐</span>
    <span class="sparkle" style="top:20px;left:5px;--sd:2.9s;">💫</span>
    <span class="sparkle" style="top:20px;right:5px;--sd:3.1s;">✨</span>
    <span class="sparkle" style="bottom:60px;left:0px;--sd:3.4s;">🌟</span>
    <span class="sparkle" style="bottom:60px;right:0px;--sd:3.6s;">✨</span>

    <svg id="sceneSvg" viewBox="0 0 500 380" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="cakeG" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#7dd3fc"/>
          <stop offset="50%" stop-color="#c4b5fd"/>
          <stop offset="100%" stop-color="#f9a8d4"/>
        </linearGradient>
        <linearGradient id="frostG" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#fff" stop-opacity=".9"/>
          <stop offset="100%" stop-color="#e0f2fe" stop-opacity=".5"/>
        </linearGradient>
        <linearGradient id="plateG" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#ddd6fe"/>
          <stop offset="100%" stop-color="#93c5fd"/>
        </linearGradient>
        <linearGradient id="bladeG" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#bae6fd"/>
          <stop offset="100%" stop-color="#ddd6fe"/>
        </linearGradient>
        <linearGradient id="skinG" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#fcd9a0"/>
          <stop offset="100%" stop-color="#f5b97a"/>
        </linearGradient>
        <linearGradient id="dressG" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#f9a8d4"/>
          <stop offset="100%" stop-color="#e879a5"/>
        </linearGradient>
        <linearGradient id="shirtG" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#7dd3fc"/>
          <stop offset="100%" stop-color="#0ea5e9"/>
        </linearGradient>
        <linearGradient id="pantsG" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#1e3a5f"/>
          <stop offset="100%" stop-color="#0f2040"/>
        </linearGradient>
        <radialGradient id="hairG">
          <stop offset="0%" stop-color="#4a2c0a"/>
          <stop offset="100%" stop-color="#2a1505"/>
        </radialGradient>
      </defs>

      <!-- TABLE -->
      <rect x="140" y="288" width="220" height="14" rx="5" fill="#4a3080" opacity=".7"/>
      <rect x="160" y="302" width="12" height="50" rx="4" fill="#3a2060" opacity=".6"/>
      <rect x="328" y="302" width="12" height="50" rx="4" fill="#3a2060" opacity=".6"/>

      <!-- PLATE -->
      <ellipse cx="250" cy="292" rx="90" ry="10" fill="url(#plateG)" opacity=".55"/>

      <!-- ===== CAKE LEFT SLICE ===== -->
      <g id="sliceL">
        <rect x="180" y="222" width="70" height="62" rx="4" fill="url(#cakeG)"/>
        <path d="M180,222 Q200,210 215,220 Q228,213 250,222 L250,234 Q228,225 215,232 Q200,222 180,234Z" fill="url(#frostG)"/>
        <rect x="188" y="174" width="62" height="50" rx="4" fill="url(#cakeG)" opacity=".93"/>
        <path d="M188,174 Q205,163 218,172 Q232,165 250,174 L250,186 Q232,177 218,184 Q205,175 188,186Z" fill="url(#frostG)"/>
        <rect x="198" y="134" width="52" height="42" rx="4" fill="url(#cakeG)" opacity=".88"/>
        <path d="M198,134 Q213,123 224,132 Q236,125 250,134 L250,145 Q236,136 224,143 Q213,135 198,145Z" fill="url(#frostG)"/>
        <circle cx="195" cy="254" r="5" fill="#fde68a" opacity=".9"/>
        <circle cx="213" cy="248" r="4" fill="#f9a8d4" opacity=".9"/>
        <circle cx="230" cy="255" r="4.5" fill="#7dd3fc" opacity=".9"/>
        <circle cx="196" cy="198" r="4" fill="#fde68a" opacity=".8"/>
        <circle cx="218" cy="192" r="3.5" fill="#c4b5fd" opacity=".8"/>
      </g>

      <!-- ===== CAKE RIGHT SLICE ===== -->
      <g id="sliceR">
        <rect x="250" y="222" width="70" height="62" rx="4" fill="url(#cakeG)" opacity=".95"/>
        <path d="M250,222 Q264,210 278,220 Q292,213 320,222 L320,234 Q292,225 278,232 Q264,222 250,234Z" fill="url(#frostG)"/>
        <rect x="250" y="174" width="62" height="50" rx="4" fill="url(#cakeG)" opacity=".9"/>
        <path d="M250,174 Q265,163 278,172 Q292,165 312,174 L312,186 Q292,177 278,184 Q265,175 250,186Z" fill="url(#frostG)"/>
        <rect x="250" y="134" width="52" height="42" rx="4" fill="url(#cakeG)" opacity=".85"/>
        <path d="M250,134 Q263,123 276,132 Q288,125 302,134 L302,145 Q288,136 276,143 Q263,135 250,145Z" fill="url(#frostG)"/>
        <circle cx="262" cy="254" r="5" fill="#c4b5fd" opacity=".9"/>
        <circle cx="283" cy="248" r="4" fill="#fde68a" opacity=".9"/>
        <circle cx="303" cy="255" r="4.5" fill="#f9a8d4" opacity=".9"/>
        <circle cx="260" cy="198" r="4" fill="#7dd3fc" opacity=".8"/>
        <circle cx="284" cy="192" r="3.5" fill="#fde68a" opacity=".8"/>
      </g>

      <!-- Cake text -->
      <text x="250" y="268" text-anchor="middle" font-family="'Quicksand',sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,.82)" letter-spacing=".5">Happy Birthday!</text>
      <text x="250" y="206" text-anchor="middle" font-family="'Great Vibes',cursive" font-size="16" fill="rgba(255,255,255,.9)">Areeba</text>

      <!-- CANDLES -->
      <rect x="210" y="114" width="7" height="22" rx="3" fill="#fde68a"/>
      <ellipse cx="213" cy="113" rx="3.5" ry="4.5" fill="#fb923c"/>
      <ellipse cx="213" cy="111" rx="1.8" ry="2.8" fill="#fef3c7" opacity=".9">
        <animate attributeName="ry" values="2.8;3.5;2;2.8" dur=".8s" repeatCount="indefinite"/>
      </ellipse>
      <rect x="225" y="112" width="7" height="24" rx="3" fill="#c4b5fd"/>
      <ellipse cx="228" cy="111" rx="3.5" ry="4.5" fill="#f97316"/>
      <ellipse cx="228" cy="109" rx="1.8" ry="2.8" fill="#fef3c7" opacity=".9">
        <animate attributeName="ry" values="3.5;2;2.8;3.5" dur=".9s" repeatCount="indefinite"/>
      </ellipse>
      <rect x="240" y="114" width="7" height="22" rx="3" fill="#7dd3fc"/>
      <ellipse cx="243" cy="113" rx="3.5" ry="4.5" fill="#fb923c"/>
      <ellipse cx="243" cy="111" rx="1.8" ry="2.8" fill="#fef3c7" opacity=".9">
        <animate attributeName="ry" values="2;2.8;3.5;2" dur=".75s" repeatCount="indefinite"/>
      </ellipse>
      <rect x="255" y="114" width="7" height="22" rx="3" fill="#f9a8d4"/>
      <ellipse cx="258" cy="113" rx="3.5" ry="4.5" fill="#f97316"/>
      <ellipse cx="258" cy="111" rx="1.8" ry="2.8" fill="#fef3c7" opacity=".9">
        <animate attributeName="ry" values="2.8;2;3.5;2.8" dur=".85s" repeatCount="indefinite"/>
      </ellipse>
      <rect x="270" y="114" width="7" height="22" rx="3" fill="#fde68a"/>
      <ellipse cx="273" cy="113" rx="3.5" ry="4.5" fill="#fb923c"/>
      <ellipse cx="273" cy="111" rx="1.8" ry="2.8" fill="#fef3c7" opacity=".9">
        <animate attributeName="ry" values="3.5;2.8;2;3.5" dur=".95s" repeatCount="indefinite"/>
      </ellipse>

      <!-- ===== BOY (left side) ===== -->
      <g id="boyGroup">
        <!-- Legs -->
        <rect x="102" y="318" width="14" height="45" rx="5" fill="url(#pantsG)"/>
        <rect x="120" y="318" width="14" height="45" rx="5" fill="url(#pantsG)"/>
        <!-- Shoes -->
        <ellipse cx="109" cy="363" rx="10" ry="5" fill="#1a1030"/>
        <ellipse cx="127" cy="363" rx="10" ry="5" fill="#1a1030"/>
        <!-- Body / shirt -->
        <rect x="96" y="252" width="44" height="68" rx="10" fill="url(#shirtG)"/>
        <!-- Right arm (extended toward cake + holds knife handle) -->
        <line x1="140" y1="268" x2="178" y2="255" stroke="#fcd9a0" stroke-width="13" stroke-linecap="round"/>
        <!-- Left arm -->
        <line x1="96"  y1="268" x2="76"  y2="290" stroke="#7dd3fc" stroke-width="12" stroke-linecap="round"/>
        <!-- Neck -->
        <rect x="111" y="240" width="14" height="16" rx="5" fill="url(#skinG)"/>
        <!-- Head -->
        <circle cx="118" cy="228" r="24" fill="url(#skinG)"/>
        <!-- Hair (boy - short) -->
        <path d="M94,218 Q96,196 118,194 Q140,196 142,218 Q136,208 118,206 Q100,208 94,218Z" fill="url(#hairG)"/>
        <!-- Eyes -->
        <circle cx="110" cy="226" r="3.5" fill="#2d1b00"/>
        <circle cx="126" cy="226" r="3.5" fill="#2d1b00"/>
        <circle cx="111" cy="225" r="1.2" fill="#fff" opacity=".8"/>
        <circle cx="127" cy="225" r="1.2" fill="#fff" opacity=".8"/>
        <!-- Smile -->
        <path d="M111,234 Q118,240 125,234" stroke="#c0825a" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- Name label -->
        <text x="118" y="175" text-anchor="middle" font-family="'Quicksand',sans-serif" font-size="11" fill="var(--sky)" font-weight="600">Mohammad</text>
        <!-- Hearts above boy -->
        <text class="coupleHeart" x="96" y="160" font-size="16" style="--hd:4.2s;">💙</text>
        <text class="coupleHeart" x="112" y="148" font-size="13" style="--hd:4.6s;">❤️</text>
      </g>

      <!-- ===== GIRL (right side) ===== -->
      <g id="girlGroup">
        <!-- Skirt/dress bottom -->
        <path d="M330,318 Q344,350 358,360 Q370,352 380,318Z" fill="#e879a5"/>
        <!-- Dress body -->
        <rect x="330" y="252" width="44" height="70" rx="10" fill="url(#dressG)"/>
        <!-- Belt detail -->
        <rect x="330" y="300" width="44" height="6" rx="3" fill="#be185d" opacity=".6"/>
        <!-- Left arm (extended toward cake) -->
        <line x1="330" y1="268" x2="292" y2="255" stroke="#fcd9a0" stroke-width="12" stroke-linecap="round"/>
        <!-- Right arm -->
        <line x1="374" y1="268" x2="394" y2="290" stroke="#f9a8d4" stroke-width="12" stroke-linecap="round"/>
        <!-- Legs -->
        <rect x="338" y="356" width="12" height="30" rx="5" fill="#be185d" opacity=".7"/>
        <rect x="354" y="356" width="12" height="30" rx="5" fill="#be185d" opacity=".7"/>
        <!-- Shoes -->
        <ellipse cx="344" cy="386" rx="10" ry="5" fill="#831843"/>
        <ellipse cx="360" cy="386" rx="10" ry="5" fill="#831843"/>
        <!-- Neck -->
        <rect x="345" y="240" width="14" height="16" rx="5" fill="url(#skinG)"/>
        <!-- Head -->
        <circle cx="352" cy="228" r="24" fill="url(#skinG)"/>
        <!-- Hair (girl - long flowing) -->
        <path d="M328,218 Q328,196 352,192 Q376,196 376,218 Q374,200 352,198 Q330,200 328,218Z" fill="url(#hairG)"/>
        <path d="M328,218 Q324,240 328,270 Q336,265 336,252Z" fill="url(#hairG)"/>
        <path d="M376,218 Q380,240 376,270 Q368,265 368,252Z" fill="url(#hairG)"/>
        <!-- Hair bow -->
        <path d="M344,194 Q352,187 360,194 Q352,198 344,194Z" fill="#f9a8d4"/>
        <!-- Eyes -->
        <circle cx="344" cy="226" r="3.5" fill="#2d1b00"/>
        <circle cx="360" cy="226" r="3.5" fill="#2d1b00"/>
        <circle cx="345" cy="225" r="1.2" fill="#fff" opacity=".8"/>
        <circle cx="361" cy="225" r="1.2" fill="#fff" opacity=".8"/>
        <!-- Lashes -->
        <line x1="342" y1="222" x2="340" y2="219" stroke="#2d1b00" stroke-width="1.2"/>
        <line x1="344" y1="221" x2="344" y2="218" stroke="#2d1b00" stroke-width="1.2"/>
        <line x1="346" y1="222" x2="348" y2="219" stroke="#2d1b00" stroke-width="1.2"/>
        <!-- Smile -->
        <path d="M345,234 Q352,241 359,234" stroke="#c0825a" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- Blush -->
        <ellipse cx="338" cy="232" rx="7" ry="4" fill="#f9a8d4" opacity=".5"/>
        <ellipse cx="366" cy="232" rx="7" ry="4" fill="#f9a8d4" opacity=".5"/>
        <!-- Name -->
        <text x="352" y="175" text-anchor="middle" font-family="'Quicksand',sans-serif" font-size="11" fill="var(--pink)" font-weight="600">Areeba</text>
        <!-- Hearts above girl -->
        <text class="coupleHeart" x="368" y="160" font-size="16" style="--hd:4.4s;">💜</text>
        <text class="coupleHeart" x="352" y="148" font-size="13" style="--hd:4.8s;">🩷</text>
      </g>

      <!-- ===== KNIFE (hands hold together) ===== -->
      <g id="knifeGroup">
        <!-- Blade -->
        <rect x="244" y="30" width="12" height="106" rx="2.5" fill="url(#bladeG)" stroke="rgba(255,255,255,.35)" stroke-width=".8"/>
        <!-- Shine -->
        <rect x="248" y="36" width="2.5" height="90" rx="1.2" fill="rgba(255,255,255,.4)"/>
        <!-- Tip -->
        <polygon points="244,136 256,136 250,150" fill="#bae6fd"/>
        <!-- Handle (boy hand side - left) -->
        <rect x="231" y="12" width="20" height="24" rx="7" fill="url(#skinG)" stroke="#fde68a" stroke-width="1.5"/>
        <!-- Handle (girl hand side - right) -->
        <rect x="249" y="12" width="20" height="24" rx="7" fill="url(#skinG)" stroke="#f9a8d4" stroke-width="1.5"/>
        <!-- Handle center bar -->
        <rect x="236" y="16" width="28" height="16" rx="4" fill="#7c3aed" opacity=".7"/>
        <line x1="241" y1="20" x2="259" y2="20" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="241" y1="24" x2="259" y2="24" stroke="#a78bfa" stroke-width="1.2" stroke-linecap="round"/>
        <!-- Sparkle on blade -->
        <text x="260" y="80" font-size="12" opacity=".7">✨</text>
      </g>
    </svg>
  </div>

  <button class="btn-main" id="cutBtn" onclick="cutCake()">🔪 Cut the Cake Together!</button>
</section>

<!-- ======= MAIN PAGE ======= -->
<section id="mainPage">
  <div class="card">
    <div class="bday-icon">🎉</div>
    <div class="bday-name">Happy Birthday</div>
    <div class="bday-name" style="margin-top:-.4em;">Areeba</div>
    <div class="nickname">~ Golo Molo · Chanda ~</div>

    <div class="divider">✦</div>

    <div id="typedMsg"><span id="cursor"></span></div>

    <div class="divider">✦</div>

    <div class="hearts-row">
      <span class="heart-anim">💙</span>
      <span class="heart-anim">🌸</span>
      <span class="heart-anim">💜</span>
      <span class="heart-anim">⭐</span>
      <span class="heart-anim">💙</span>
    </div>

    <div class="final-msg">
      <div class="final-line1">Happy Birthday my Chanda 💖</div>
      <div class="final-line2">With love, Mohammad Awan</div>
    </div>
  </div>
</section>

<script>
/* STARS */
(function(){for(let i=0;i<150;i++){const s=document.createElement('div');s.className='star';const sz=Math.random()*3+1;s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;--dl:${-Math.random()*5}s;--op:${.3+Math.random()*.65};`;document.body.appendChild(s);}})();

/* PETALS */
(function(){const em=['🌸','🌺','🌷','❀'];for(let i=0;i<16;i++){const p=document.createElement('div');p.className='petal';p.textContent=em[Math.floor(Math.random()*em.length)];p.style.cssText=`--fs:${.9+Math.random()*1.3}rem;--dur:${7+Math.random()*8}s;--del:${-Math.random()*12}s;--lft:${Math.random()*100}%;`;document.body.appendChild(p);}})();

/* HEARTS */
(function(){const em=['💙','💜','💗','💕','🩷'];for(let i=0;i<12;i++){const h=document.createElement('div');h.className='fheart';h.textContent=em[Math.floor(Math.random()*em.length)];h.style.cssText=`--fhs:${1+Math.random()*1.6}rem;--fhd:${8+Math.random()*9}s;--fhdel:${-Math.random()*14}s;--fhl:${Math.random()*100}%;`;document.body.appendChild(h);}})();

/* BALLOONS */
function spawnBalloons(){const em=['🎈','🎀','🎊','🎉','💙','💜'];for(let i=0;i<16;i++){const b=document.createElement('div');b.className='balloon';b.textContent=em[Math.floor(Math.random()*em.length)];b.style.cssText=`--bfs:${1.8+Math.random()*1.8}rem;--bd:${6+Math.random()*7}s;--bdel:${Math.random()*9}s;--blft:${5+Math.random()*88}%;`;document.body.appendChild(b);}}

/* CONFETTI */
const canvas=document.getElementById('confettiCanvas');
const ctx=canvas.getContext('2d');
let pieces=[],active=false;
function resize(){canvas.width=innerWidth;canvas.height=innerHeight;}
resize();addEventListener('resize',resize);
const COLS=['#7dd3fc','#c4b5fd','#fde68a','#f9a8d4','#ffffff','#a5f3fc','#d8b4fe'];
function addPieces(n){for(let i=0;i<n;i++)pieces.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height-canvas.height,w:5+Math.random()*7,h:9+Math.random()*7,color:COLS[Math.floor(Math.random()*COLS.length)],rot:Math.random()*Math.PI*2,vx:-2+Math.random()*4,vy:2+Math.random()*3.5,vr:(Math.random()-.5)*.14});}
function drawConfetti(){ctx.clearRect(0,0,canvas.width,canvas.height);pieces.forEach(c=>{c.x+=c.vx;c.y+=c.vy;c.rot+=c.vr;if(c.y>canvas.height){c.y=-20;c.x=Math.random()*canvas.width;}ctx.save();ctx.translate(c.x,c.y);ctx.rotate(c.rot);ctx.globalAlpha=.85;ctx.fillStyle=c.color;ctx.fillRect(-c.w/2,-c.h/2,c.w,c.h);ctx.restore();});if(active)requestAnimationFrame(drawConfetti);}

/* TYPED MESSAGE */
const MSG=`Dear Areeba!\n\nWishing you the happiest birthday! You light up every room, my Chanda. 🌙

May this year bring you joy, smiles, and all the love you deserve. 🌸\n\nI really value the bond we share and am always rooting for your success.\nI've sent a little something your way—I hope it makes you smile when you click the link! 💙`;
let ci=0;
function typeMsg(){const el=document.getElementById('typedMsg');const cur=document.getElementById('cursor');if(ci<MSG.length){const ch=MSG[ci];if(ch==='\n')el.insertBefore(document.createElement('br'),cur);else el.insertBefore(document.createTextNode(ch),cur);ci++;setTimeout(typeMsg,ch===','||ch==='.'?90:ch==='\n'?380:40);}}

/* MUSIC */
const audio=document.getElementById('bgMusic');
const musicBtn=document.getElementById('musicBtn');
let playing=false;
function fadeInMusic(){audio.volume=0;audio.play().then(()=>{playing=true;musicBtn.textContent='🔊';let v=0;const t=setInterval(()=>{if(v<.45){v+=.02;audio.volume=Math.min(v,.45);}else clearInterval(t);},100);}).catch(()=>{});}
musicBtn.addEventListener('click',()=>{if(playing){audio.pause();playing=false;musicBtn.textContent='🎵';}else{audio.play();playing=true;musicBtn.textContent='🔊';}});

/* FLOW */
function goToCake(){
  const splash=document.getElementById('splash');
  const cake=document.getElementById('cakeScreen');
  splash.style.transition='opacity .7s ease,transform .7s ease';
  splash.style.opacity='0';splash.style.transform='scale(.95)';
  setTimeout(()=>{
    splash.style.display='none';
    cake.style.display='flex';cake.style.opacity='0';
    cake.style.transition='opacity .9s ease';
    requestAnimationFrame(()=>{cake.style.opacity='1';});
    musicBtn.style.display='flex';
    fadeInMusic();
  },750);
}

let cakeCut=false;
function cutCake(){
  if(cakeCut)return;
  cakeCut=true;
  const btn=document.getElementById('cutBtn');
  btn.disabled=true;btn.style.opacity='.5';btn.textContent='🎉 Cutting...';

  // 1. Boy & girl walk in
  setTimeout(()=>{
    document.getElementById('boyGroup').classList.add('walkin');
    document.getElementById('girlGroup').classList.add('walkin');
  },200);

  // 2. Knife appears & slides down
  setTimeout(()=>{
    document.getElementById('knifeGroup').classList.add('cut');
  },1600);

  // 3. Cake slices open
  setTimeout(()=>{
    document.getElementById('sliceL').classList.add('open');
    document.getElementById('sliceR').classList.add('open');
  },3000);

  // 4. Confetti + balloons burst
  setTimeout(()=>{
    active=true;addPieces(250);drawConfetti();
    spawnBalloons();
    let b=0;const iv=setInterval(()=>{addPieces(80);b++;if(b>=4)clearInterval(iv);},2400);
  },3200);

  // 5. Couple walks out
  setTimeout(()=>{
    document.getElementById('boyGroup').classList.remove('walkin');
    document.getElementById('boyGroup').classList.add('walkout');
    document.getElementById('girlGroup').classList.remove('walkin');
    document.getElementById('girlGroup').classList.add('walkout');
  },6000);

  // 6. Go to main birthday message
  setTimeout(goToMain,7200);
}

function goToMain(){
  const cake=document.getElementById('cakeScreen');
  const main=document.getElementById('mainPage');
  cake.style.transition='opacity .9s ease';cake.style.opacity='0';
  setTimeout(()=>{
    cake.style.display='none';
    main.style.display='flex';main.style.opacity='0';
    main.style.transition='opacity 1s ease';
    requestAnimationFrame(()=>{main.style.opacity='1';});
    setTimeout(typeMsg,600);
    setTimeout(()=>{pieces=pieces.slice(0,70);},14000);
  },900);
}
</script>
</body>
</html>
